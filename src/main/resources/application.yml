spring:
  # Multipart file upload configuration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  
  ai:
    mcp:
      server:
        enabled: true
        transport: http
        base-path: /mcp
        # MCP server will automatically discover @McpTool annotated methods
        annotation-scan:
          enabled: true

# Google OAuth Configuration
google:
  oauth:
    client-id: ${GOOGLE_CLIENT_ID:your_client_id.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET:your_client_secret}

# App base URL for download links (used by File Converter MCP for download URLs)
app:
  base-url: ${APP_BASE_URL:http://api.jadeordersmedia.com}
  # Public website / dashboard URL (used in team invite emails)
  frontend-url: ${FRONTEND_URL:${APP_FRONTEND_URL:}}
  # Path appended to frontend-url for the “open app” link in invite emails (leading slash)
  frontend-invite-path: ${APP_FRONTEND_INVITE_PATH:/ai-chatbots}
  # From address for team invite emails (optional if spring.mail.username is set)
  mail:
    from: ${APP_MAIL_FROM:}
  # SMTP is not defined here — set spring.mail.* via env or config server, for example:
  #   SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
  # Team invites also need app.frontend-url (FRONTEND_URL / APP_FRONTEND_URL) for the link in the email.

# Encryption Configuration (for storing OAuth tokens securely)
encryption:
  key: ${ENCRYPTION_KEY:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}

# Shopify Integration
# Webhook auto-enhance uses: {app.base-url}/api/public/shopify/webhook/{userId}
# Ensure app.base-url is set correctly in production.

# Amazon SP-API Integration
# Requires an approved Amazon SP-API app (registered in Seller Central):
#   AMAZON_LWA_APP_ID       — the "application_id" shown on the app dashboard
#   AMAZON_LWA_CLIENT_ID    — LWA client id (login-with-amazon.com)
#   AMAZON_LWA_CLIENT_SECRET — LWA client secret
# OAuth redirect must be registered as: {FRONTEND_URL}/auth/amazon/callback
# SQS-based push notifications need an SQS queue ARN that grants SP-API
# (principal 437568002678) SendMessage permission. The queue's messages
# are then forwarded to {app.base-url}/api/public/amazon/sqs-ingest/{userId}
# by a lightweight worker or Lambda.
amazon:
  lwa:
    app-id: ${AMAZON_LWA_APP_ID:}
    client-id: ${AMAZON_LWA_CLIENT_ID:}
    client-secret: ${AMAZON_LWA_CLIENT_SECRET:}

# eBay Sell API Integration
# Requires an eBay developer account + a registered app:
#   EBAY_APP_ID   — the Client ID from your eBay developer dashboard
#   EBAY_CERT_ID  — the Client Secret ("Cert ID") from your eBay developer dashboard
#   EBAY_RU_NAME  — the RuName registered in the eBay dashboard whose
#                   "Your auth accepted URL" points to {FRONTEND_URL}/auth/ebay/callback
#   EBAY_SANDBOX  — "true" to default new connects to the eBay sandbox, "false" for production
# Platform notifications need a publicly reachable HTTPS endpoint. We expose
# {app.base-url}/api/public/ebay/notify/{userId}; callers supply a
# verification token they also register with eBay.
ebay:
  oauth:
    app-id:   ${EBAY_APP_ID:}
    cert-id:  ${EBAY_CERT_ID:}
    ru-name:  ${EBAY_RU_NAME:}
    sandbox:  ${EBAY_SANDBOX:false}

# AliExpress Open Platform (TOP) — OAuth + gw.api.taobao.com
# Register an app at https://developers.aliexpress.com — set callback URL to:
#   {FRONTEND_URL}/auth/aliexpress/callback
aliexpress:
  oauth:
    app-key:       ${ALIEXPRESS_APP_KEY:}
    app-secret:    ${ALIEXPRESS_APP_SECRET:}
    redirect-uri:  ${ALIEXPRESS_REDIRECT_URI:}
    authorize-host: https://oauth.aliexpress.com
    token-host:     https://oauth.aliexpress.com
  api:
    gateway-url: https://gw.api.taobao.com/router/rest

# Supabase Configuration (from config server)
supabase:
  url: ${supabase.url:}
  service-role-key: ${supabase.service-role-key:}
  bucket: ${supabase.bucket:social-media-assets}

management:
  endpoints:
    web:
      exposure:
        include: "health"
  endpoint:
    health:
      show-details: always # Optional: useful for debugging local vs cloud